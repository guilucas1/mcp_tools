name: claude-mcp-servers

# Custom network for service isolation
networks:
  mcp-network:
    driver: bridge

services:
  basic-memory:
    image: ghcr.io/basicmachines-co/basic-memory:latest
    container_name: claude-basic-memory
    restart: unless-stopped
    
    # Resource limits (safe optimization)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    
    volumes:
      - "./database:/app/data"
      - "./config:/root/.basic-memory"
    
    networks:
      - mcp-network
    
    ports:
      - "8888:8000"
    
    environment:
      - PYTHONUNBUFFERED=1
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  think-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: claude-think-mcp
    restart: unless-stopped
    
    depends_on:
      - basic-memory
    
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    volumes:
      - "./data:/app/data"
    
    networks:
      - mcp-network
    
    ports:
      - "8004:8000"
    
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      # Use /tmp for UV cache (app user can write here)
      - UV_CACHE_DIR=/tmp/uv-cache
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  calculator:
    build:
      context: .
      dockerfile: Dockerfile.calculator
    
    container_name: claude-calculator
    restart: unless-stopped
    
    depends_on:
      - basic-memory
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    
    healthcheck:
      test: ["CMD", "python", "-c", "import mcp_server_calculator; import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    networks:
      - mcp-network
    
    ports:
      - "8002:8000"
    
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - UV_CACHE_DIR=/tmp/uv-cache
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        
  minima:
    build:
      context: .
      dockerfile: Dockerfile.minima
    
    container_name: claude-minima
    restart: unless-stopped
    
    depends_on:
      - basic-memory
    
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    
    healthcheck:
      test: ["CMD", "ps", "aux", "|", "grep", "-q", "minima", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    volumes:
      - "./data:/app/data:rw"
      - "${LOCAL_FILES_PATH:-./documents}:/app/documents:rw"
    
    networks:
      - mcp-network
    
    ports:
      - "8003:8000"  # MCP server port
      - "8001:8001"  # Indexer port
    
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - LOCAL_FILES_PATH=/app/documents
      - EMBEDDING_MODEL_ID=sentence-transformers/all-mpnet-base-v2
      - EMBEDDING_SIZE=768
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"